<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marco Pérez Padilla - Poker</title>
  <script type="module" crossorigin src="/Proyectos-Web-PAI/dist/assets/p13Poker1-DbqEiU6S.js"></script>
  <link rel="modulepreload" crossorigin href="/Proyectos-Web-PAI/dist/assets/modulepreload-polyfill-CyXKLSat.js">
  <link rel="stylesheet" crossorigin href="/Proyectos-Web-PAI/dist/assets/ull-bulma-DaFEzXAc.css">
</head>
<body>
  <!-- Header -->
  <section class="hero is-primary">
    <div class="hero-body" style="padding: 0.75rem 1.5rem;">
      <div class="container">
        <h1 class="title has-text-white">PAI Práctica 13 - Poker</h1>
        <h2 class="subtitle has-text-white-ter">Marco Pérez Padilla — Grado en Ingeniería Informática · ULL</h2>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <!-- Block 1: Points -->
      <div class="box">
        <div class="columns is-mobile">
          <div class="column">
            <p class="heading">Points</p>
            <p id="pointsDisplay" class="title is-5 has-text-white">0</p>
          </div>
        </div>
      </div>
      <!-- Block 2: Current Hand -->
      <div class="box">
        <canvas id="handCanvas" width="900" height="180"></canvas>
      </div>

      <!-- Block 3: Game control -->
      <div class="box">
        <div class="buttons">
          <button id="playGreaterButton" class="button is-primary">Mayor</button>
          <button id="playLessThanButton" class="button is-warning">Menor</button>
          <button id="newGamebutton" class="button is-info">Nuevo Juego</button>
        </div>
        <p id="statusMessage" class="has-text-centered"></p>
      </div>

    </div>
  </section>
</body>
</html>
